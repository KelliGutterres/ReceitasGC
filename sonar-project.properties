# SonarQube Cloud — escopo da análise
# No GitHub Actions use as variáveis SONAR_ORGANIZATION e SONAR_PROJECT_KEY.
# Organization key: em sonarcloud.io é o identificador técnico da org (pode diferir do nome
# à frente). Confirme em Organization → Administration → "Key", ou na página do projeto em
# Project information → Organization key. Erro "Organization key X does not exist" = valor
# errado na variável SONAR_ORGANIZATION (maiúsculas/minúsculas contam).
# Project key: em Project information → Project key (muitas vezes no formato orgkey_nomeproj).
sonar.sources=src
sonar.sourceEncoding=UTF-8
sonar.tests=src
sonar.test.inclusions=**/*.test.js
sonar.exclusions=**/node_modules/**,**/coverage/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/src/tests/**
