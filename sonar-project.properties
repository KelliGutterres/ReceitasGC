# SonarQube Cloud / Server — escopo da análise
# organization e projectKey: defina no GitHub (variáveis SONAR_ORGANIZATION e SONAR_PROJECT_KEY)
# ou acrescente aqui: sonar.organization=... e sonar.projectKey=...
sonar.sources=src
sonar.sourceEncoding=UTF-8
sonar.tests=src
sonar.test.inclusions=**/*.test.js
sonar.exclusions=**/node_modules/**,**/coverage/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/src/tests/**
